<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nephy Support — Help & Feedback</title>
  <meta name="description" content="Get support for Nephy iOS app. Reach out to the developer for any issues, bugs, or feedback.">
  <link rel="stylesheet" href="style.css">
  <style>
    .support-card-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 100px);
      padding: 120px 24px 60px 24px;
    }
    .support-card {
      background: var(--surface);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 48px;
      max-width: 550px;
      width: 100%;
      text-align: center;
      box-shadow: 0 10px 30px var(--shadow-color);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .support-icon {
      font-size: 48px;
      margin-bottom: 24px;
      display: inline-block;
      animation: pulse 2.5s infinite ease-in-out;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }
    .support-card h1 {
      font-size: 32px;
      color: var(--text);
      margin-bottom: 16px;
    }
    .support-card p {
      font-size: 16px;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .email-btn {
      font-size: 16px;
      padding: 12px 28px;
    }
    .back-home-link {
      display: inline-block;
      margin-top: 28px;
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 600;
    }
    .back-home-link:hover {
      color: var(--primary);
      transform: translateX(-3px);
    }
  </style>
</head>
<body>

  <!-- Header & Navigation -->
  <header>
    <div class="container nav-wrapper">
      <a href="index.html" class="logo">
        <div class="logo-icon">
          <!-- Inline App Icon SVG -->
          <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="logoGradLight" x1="0.5" y1="1" x2="0.5" y2="0.3">
                <stop offset="0%" stop-color="#9FD9F7" />
                <stop offset="100%" stop-color="#D8F2FF" />
              </linearGradient>
              <linearGradient id="logoGradDark" x1="0.5" y1="1" x2="0.5" y2="0.3">
                <stop offset="0%" stop-color="#050A14" />
                <stop offset="100%" stop-color="#123446" />
              </linearGradient>
            </defs>
            <rect class="logo-bg" width="120" height="120" rx="26" fill="url(#logoGradLight)"/>
            <g transform="translate(15, 15) scale(1.5)">
              <g class="logo-sun" fill="#C97812">
                <path d="M17 12C17 14.7614 14.7614 17 12 17C9.23858 17 7 14.7614 7 12C7 9.23858 9.23858 7 12 7C14.7614 7 17 9.23858 17 12Z" />

              </g>
              <g transform="translate(6, 6) scale(0.28)">
                <path class="logo-coin-base" fill="#E7b85f" d="M22,44C9.869,44,0,34.131,0,22S9.869,0,22,0s22,9.869,22,22S34.131,44,22,44z"/>
                <path class="logo-coin-slot" fill="#C97812" d="M22.745,32h-1.491C20.009,32,19,30.991,19,29.745V13.255C19,12.009,20.009,11,21.255,11h1.491 C23.991,11,25,12.009,25,13.255v16.491C25,30.991,23.991,32,22.745,32z"/>
              </g>
            </g>
          </svg>
        </div>
        <span>Nephy</span>
      </a>

      <div class="controls-group">
        <!-- Language Switcher -->
        <button class="lang-switch" id="langToggle">FR</button>
        
        <!-- Dark Mode Toggle Button -->
        <button class="icon-btn" id="themeToggle" aria-label="Toggle dark mode">
          <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
          <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Support Card -->
  <div class="support-card-container">
    <div class="support-card">
      <div class="support-icon">✉️</div>
      <h1 data-i18n="support-title">Nephy Support</h1>
      <p data-i18n="support-desc">Have questions, feedback, or need help with iCloud sync or category keywords? Drop me an email, I usually respond within 24 hours.</p>
      
      <a href="mailto:ocher_temp2l@icloud.com" class="btn btn-primary email-btn">
        <span>ocher_temp2l@icloud.com</span>
      </a>
      
      <div>
        <a href="index.html" class="back-home-link" data-i18n="support-back-home">&larr; Back to Home</a>
      </div>
    </div>
  </div>

  <script>
    const supportTranslations = {
      en: {
        "support-title": "Nephy Support",
        "support-desc": "Have questions, feedback, or need help with iCloud sync or category keywords? Drop me an email, I usually respond within 24 hours.",
        "support-back-home": "← Back to Home"
      },
      fr: {
        "support-title": "Assistance Nephy",
        "support-desc": "Des questions, des remarques ou besoin d'aide pour la synchronisation iCloud ou vos mots-clés ? Écrivez-moi un e-mail, je réponds généralement sous 24 heures.",
        "support-back-home": "← Retour à l'Accueil"
      }
    };

    let currentLang = localStorage.getItem("lang") || "en";
    let currentTheme = localStorage.getItem("theme") || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");

    const themeToggle = document.getElementById("themeToggle");
    const langToggle = document.getElementById("langToggle");
    const iconMoon = themeToggle.querySelector(".icon-moon");
    const iconSun = themeToggle.querySelector(".icon-sun");

    function applyTheme(theme) {
      if (theme === "dark") {
        document.body.classList.add("dark");
        iconMoon.style.display = "none";
        iconSun.style.display = "block";
      } else {
        document.body.classList.remove("dark");
        iconMoon.style.display = "block";
        iconSun.style.display = "none";
      }
    }

    function applyLanguage(lang) {
      langToggle.textContent = lang === "en" ? "FR" : "EN";
      document.documentElement.lang = lang;
      
      const elements = document.querySelectorAll("[data-i18n]");
      elements.forEach(el => {
        const key = el.getAttribute("data-i18n");
        if (supportTranslations[lang][key]) {
          el.textContent = supportTranslations[lang][key];
        }
      });
    }

    themeToggle.addEventListener("click", () => {
      currentTheme = currentTheme === "dark" ? "light" : "dark";
      localStorage.setItem("theme", currentTheme);
      applyTheme(currentTheme);
    });

    langToggle.addEventListener("click", () => {
      currentLang = currentLang === "en" ? "fr" : "en";
      localStorage.setItem("lang", currentLang);
      applyLanguage(currentLang);
    });

    // Init page states
    applyTheme(currentTheme);
    applyLanguage(currentLang);
  </script>
</body>
</html>
